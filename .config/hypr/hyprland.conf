# {% if SYSTEM.hostname == "desktop" %}
monitor=DP-2,2560x1440@144,0x0,1
monitor=HDMI-A-2,1920x1080@60,-1920x0,1
# {% end %}

# {% if SYSTEM.hostname == "laptop" %}
#<yolk> monitor=eDP-1,preferred,1920x1080,1
#<yolk> monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1
# {% end %}

$terminal = ghostty
$fileManager = dolphin
$menu = vicinae toggle
$network = networkmanager_dmenu
$music = spotify
$webBrowser = zen-browser

exec-once = qs -d
exec-once = wl-paste --type text --watch cliphist
exec-once = wl-paste --type image --watch cliphist
exec-once = dunst
exec-once = hypridle
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/change_wallpaper.sh 1800
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
exec-once = systemctl --user start hyprpolkitagent
exec-once = vicinae server
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'catppuccin-frappe-dark-cursors'

env = HYPRCURSOR_THEME, catppuccin-frappe-dark-cursors
env = HYPRCURSOR_SIZE,20
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_MENU_PREFIX,arch-
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GTK_USE_PORTAL, 1

general { 
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(ef9f76)
    col.inactive_border = rgb(292c3c)
    resize_on_border = true
    hover_icon_on_border = true
    allow_tearing = false
    layout = scrolling

}

xwayland {
    force_zero_scaling = true
}

decoration {
    rounding = 16
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        enabled = false
            size = 3
            passes = 3

            vibrancy = 0.1696
    }
    shadow {
        enabled = false
    }
}

misc {
    vrr = 0
    focus_on_activate = true
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.8, 0.1, 1.05
    bezier = overshot, 0.05, 0.8, 0.1, 1.1
    bezier = grav, 1, 0.5, 0, 0.5
    bezier = resist, 1, 0, 0, 1
    bezier = quart, 0.25, 1, 0.5, 1
    bezier = easeInExpo, 0.7, 0, 0.84, 0
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeInOutExpo, 0.87, 0, 0.13, 1
    bezier = easeInOutElastic, 0.5, 1.8, 0.3, 0.8
    animation = windowsIn, 1, 2, grav, slide bottom
    animation = windowsOut, 1, 2, grav, slide bottom
    animation = windowsMove, 1, 2, grav
    animation = fade, 1, 2, grav
    animation = fadeSwitch, 1, 2, grav
    animation = fadeShadow, 1, 2, grav
    animation = workspaces, 1, 2, grav, slide
    animation = specialWorkspace, 1, 2, grav, slidevert
}

dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

scrolling {
    focus_fit_method = 1
    fullscreen_on_one_column = 1
}

misc { 
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =
    follow_mouse = 1
    repeat_rate = 35
    repeat_delay = 200
# {% if SYSTEM.hostname == "laptop" %}
    #<yolk> accel_profile = "adaptive"
    #<yolk> sensitivity = 0.2
# {% else %}
    accel_profile = "flat"
    sensitivity = -0.9
# {% end %}
    touchpad {
        natural_scroll = true
    }

    # tablet {
    #     left_handed = true
    #     region_size = 2560, 1440
    # }
}

device {
    name = wacom-bamboo-one-s-pen
    output = DP-2
    sensitivity = 2
}

cursor {
    no_hardware_cursors = false
}

group {
    col.border_active = rgb(ef9f76)
    col.border_inactive = rgb(303446)

    groupbar {
        render_titles = false
        rounding = 2
        indicator_height = 2
        col.active = rgb(ef9f76)
        col.inactive = rgb(303446)
    }
}



# gestures {

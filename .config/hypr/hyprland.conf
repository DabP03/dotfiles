$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, $music
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exec, [float; size 40% 94.55%; move .4% 4.75%] $fileManager
bind = $mainMod CTRL SHIFT, E, exec, [float; size 40% 94.55%; move 59.7% 4.75%] $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, R, exec, $menu
bind = $mainMod, W, exec, $webBrowser
# bind = $mainMod CTRL ALT, L, exec, hyprlock

bind = $mainMod, F1, exec, ~/.config/hypr/scripts/mute.sh
bind = $mainMod, F2, exec, pamixer -d 5
bind = $mainMod, F3, exec, pamixer -i 5
bind = $mainMod, F5, exec, brightnessctl set 5%- 
bind = $mainMod, F6, exec, brightnessctl set +5%
bind = $mainMod, F9, exec, ~/.config/hypr/scripts/player_controls.sh play-pause
bind = $mainMod, F10, exec, playerctl previous
bind = $mainMod, F11, exec, playerctl next
bind = $mainMod SHIFT, F10, exec, ~/.config/hypr/scripts/player_controls.sh volume 0.05-
bind = $mainMod SHIFT, F11, exec, ~/.config/hypr/scripts/player_controls.sh volume 0.05+

bind = $mainMod SHIFT, S, exec, hyprshot -m region --freeze --raw | satty --filename -
bind = $mainMod CTRL, S, exec, hyprshot -m region --freeze --clipboard-only 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, mouse_down, movefocus, l
bind = $mainMod, mouse_up, movefocus, r

bind = $mainMod CTRL, H, workspace, -1
bind = $mainMod CTRL, L, workspace, +1

bind = $mainMod CTRL, Left, workspace, -1
bind = $mainMod CTRL, Right, workspace, +1


bind = $mainMod CTRL, mouse_down, workspace, -1
bind = $mainMod CTRL, mouse_up, workspace, +1

bind = $mainMod CTRL SHIFT, H, movetoworkspace, -1
bind = $mainMod CTRL SHIFT, L, movetoworkspace, +1

bind = $mainMod CTRL SHIFT, Left, movetoworkspace, -1
bind = $mainMod CTRL SHIFT, Right, movetoworkspace, +1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace with mainMod + CTRL + SHIFT + [0-9]
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

bind = $mainMod SHIFT, l, layoutmsg, swapcol l
bind = $mainMod SHIFT, h, layoutmsg, swapcol r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Groups
bind = $mainMod, G, togglegroup
bind = $mainMod ALT, H, changegroupactive, b
bind = $mainMod ALT, L, changegroupactive, f
bind = $mainMod ALT, J, movewindoworgroup, l
bind = $mainMod ALT, K, movewindoworgroup, r

# Resizing
bind = $mainMod ALT CTRL, H, resizeactive, -60 0
bind = $mainMod ALT CTRL, J, resizeactive, 0 60
bind = $mainMod ALT CTRL, K, resizeactive, 0 -60 
bind = $mainMod ALT CTRL, L, resizeactive, 60 0

bind = $mainMod ALT CTRL, LEFT, resizeactive, -60 0
bind = $mainMod ALT CTRL, DOWN, resizeactive, 0 60
bind = $mainMod ALT CTRL, UP, resizeactive, 0 -60 
bind = $mainMod ALT CTRL, RIGHT, resizeactive, 60 0

# Scrolling

bind = $mainMod SHIFT, f, layoutmsg, colresize +conf

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
windowrule = match:class ^(steam)$ match:title ^(Friends List)$, float true
windowrule = match:class ^(steam)$ match:title ^(Steam Settings)$, float true

windowrule = match:class .*, suppress_event maximize  # You'll probably like this.
windowrule = match:class ^(hyprland-share-picker), float true
windowrule = match:class ^(com.gabm.satty), float true


